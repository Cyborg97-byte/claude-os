<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer OS — One Notion System to Run Your Freelance Business</title>
<meta name="description" content="Freelancer OS is a complete Notion workspace for freelancers. Client tracker, invoice tracker, lead pipeline, AI prompts — €27 one-time.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0b;
    --surface: #141413;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #8a8680;
    --accent: #c8f55a;
    --accent-dark: #a8d43a;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Manrope', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 2rem;
    background: rgba(12,12,11,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .nav-cta { background: var(--accent); color: #0c0c0b; font-size: 13px; font-weight: 600; padding: 0.5rem 1.25rem; border-radius: 100px; transition: background 0.2s; }
  .nav-cta:hover { background: var(--accent-dark); }

  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 8rem 2rem 5rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(200,245,90,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
  .hero h1 {
    font-family: var(--serif); font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 400; line-height: 1.1; letter-spacing: -0.02em;
    max-width: 750px; margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero-sub { font-size: 1.1rem; color: var(--muted); max-width: 480px; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.3s; }
  .hero-actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; opacity: 0; animation: fadeUp 0.6s ease forwards 0.4s; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #0c0c0b;
    font-weight: 600; font-size: 15px;
    padding: 0.85rem 2rem; border-radius: 100px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-secondary { font-size: 14px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 0.2s; }
  .btn-secondary:hover { color: var(--text); }

  .stats {
    display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap;
    margin-top: 5rem; padding-top: 3rem; border-top: 1px solid var(--border);
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.5s;
  }
  .stat { text-align: center; }
  .stat-num { font-family: var(--serif); font-size: 2.2rem; color: var(--accent); display: block; }
  .stat-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

  section { padding: 6rem 2rem; max-width: 900px; margin: 0 auto; }
  .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.75rem; }
  .section-title { font-family: var(--serif); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 400; line-height: 1.2; margin-bottom: 3rem; }

  .divider { border: none; border-top: 1px solid var(--border); max-width: 900px; margin: 0 auto; }

  .features-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  }
  .feature-card { background: var(--surface); padding: 2rem; transition: background 0.2s; }
  .feature-card:hover { background: #1c1c1a; }
  .feature-icon { font-size: 1.4rem; margin-bottom: 1rem; }
  .feature-card h3 { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; margin-bottom: 0.5rem; }
  .feature-card p { font-size: 14px; color: var(--muted); line-height: 1.5; }

  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
  .step-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 0.5rem; }
  .step p { font-size: 15px; color: var(--muted); }

  .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
  .review-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; }
  .review-stars { color: var(--accent); font-size: 14px; margin-bottom: 1rem; letter-spacing: 2px; }
  .review-text { font-family: var(--serif); font-size: 1.05rem; font-weight: 400; color: var(--text); line-height: 1.5; margin-bottom: 1rem; }
  .review-author { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .who-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
  .who-card { border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .who-card h3 { font-family: var(--mono); font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .who-card p { font-size: 14px; color: var(--muted); }

  .cta-section { text-align: center; padding: 7rem 2rem; max-width: 700px; margin: 0 auto; }
  .cta-section h2 { font-family: var(--serif); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 400; margin-bottom: 1rem; }
  .cta-section p { color: var(--muted); margin-bottom: 2.5rem; }
  .price-row { display: flex; align-items: baseline; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
  .price-main { font-family: var(--serif); font-size: 3.5rem; }
  .price-note { color: var(--muted); font-size: 14px; }
  .buy-options { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-outline { border: 1px solid var(--border); color: var(--text); font-size: 14px; padding: 0.75rem 1.75rem; border-radius: 100px; transition: border-color 0.2s; }
  .btn-outline:hover { border-color: var(--border-hover); }

  footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2rem; border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    max-width: 900px; margin: 0 auto;
  }
  footer a { color: var(--muted); transition: color 0.2s; }
  footer a:hover { color: var(--text); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.25rem; }
    .hero { padding: 6rem 1.25rem 3rem; min-height: auto; }
    .hero-actions { flex-direction: column; align-items: stretch; }
    .btn-primary { justify-content: center; }
    .btn-secondary { text-align: center; }
    section { padding: 3.5rem 1.25rem; }
    .stats { gap: 2rem; margin-top: 3rem; }
    .buy-options { flex-direction: column; align-items: center; }
    .btn-outline { text-align: center; width: 100%; max-width: 280px; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
